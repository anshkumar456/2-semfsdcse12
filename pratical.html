<!DOCTYPE html>
<html>
<head>
    <title>Student Marks and Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 30px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        input, button {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Student Marks & Grade Calculator</h2>

    <input type="text" id="name" placeholder="Enter Student Name">

    <input type="number" id="m1" placeholder="Subject 1 Marks">
    <input type="number" id="m2" placeholder="Subject 2 Marks">
    <input type="number" id="m3" placeholder="Subject 3 Marks">
    <input type="number" id="m4" placeholder="Subject 4 Marks">
    <input type="number" id="m5" placeholder="Subject 5 Marks">

    <button onclick="calculateGrade()">Calculate</button>

    <div id="result"></div>

    <script>
        function calculateGrade() {
            let name = document.getElementById("name").value;

            let m1 = Number(document.getElementById("m1").value);
            let m2 = Number(document.getElementById("m2").value);
            let m3 = Number(document.getElementById("m3").value);
            let m4 = Number(document.getElementById("m4").value);
            let m5 = Number(document.getElementById("m5").value);

            let total = m1 + m2 + m3 + m4 + m5;
            let percentage = total / 5;
            let grade;

            if (percentage >= 90) {
                grade = "A+";
            } else if (percentage >= 80) {
                grade = "A";
            } else if (percentage >= 70) {
                grade = "B";
            } else if (percentage >= 60) {
                grade = "C";
            } else if (percentage >= 50) {
                grade = "D";
            } else {
                grade = "F";
            }

            document.getElementById("result").innerHTML =
                `Student Name: ${name}<br>
                 Total Marks: ${total}/500<br>
                 Percentage: ${percentage.toFixed(2)}%<br>
                 Grade: ${grade}`;
        }
    </script>

</body>
</html>
