<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Day Task Manager</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      text-align: center;
      color: #4f46e5;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    input, select, button, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    textarea { resize: vertical; min-height: 44px; }
    input:focus, select:focus, textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .row > * { flex: 1; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    button {
      cursor: pointer;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: 600;
      transition: 0.2s ease;
    }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    .secondary { background: #6b7280; }
    .success { background: #16a34a; }
    .danger { background: #dc2626; }
    .warning { background: #f59e0b; color: #111827; }
    .filters button {
      width: auto;
      padding: 10px 14px;
    }
    .task-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }
    .task {
      border: 1px solid #e5e7eb;
      border-left: 6px solid #4f46e5;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }
    .task.done {
      opacity: 0.72;
      border-left-color: #16a34a;
      text-decoration: none;
    }
    .task-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      flex-wrap: wrap;
    }
    .title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
      font-size: 13px;
      color: #4b5563;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
    }
    .priority-low { background: #d1fae5; }
    .priority-medium { background: #fef3c7; }
    .priority-high { background: #fee2e2; }
    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .task-actions button {
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
    }
    .empty {
      text-align: center;
      color: #6b7280;
      padding: 30px 10px;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0 18px;
    }
    .stat {
      background: #f3f4f6;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
    }
    .edit-mode {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
    }
    .small {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Student Day Task Manager</h1>

      <div class="stats">
        <div class="stat">Total: <span id="totalCount">0</span></div>
        <div class="stat">Done: <span id="doneCount">0</span></div>
        <div class="stat">Pending: <span id="pendingCount">0</span></div>
      </div>

      <div class="edit-mode" id="editModeBox">
        Editing task... update details and click <b>Save Task</b>.
      </div>

      <div class="grid">
        <input type="text" id="title" placeholder="Task title" />
        <input type="date" id="date" />
        <select id="priority">
          <option value="Low">Low Priority</option>
          <option value="Medium" selected>Medium Priority</option>
          <option value="High">High Priority</option>
        </select>
      </div>

      <div class="grid">
        <textarea id="description" placeholder="Task description"></textarea>
        <input type="time" id="time" />
      </div>

      <div class="actions">
        <button id="saveBtn">Add Task</button>
        <button class="secondary" id="clearBtn">Clear Form</button>
        <button class="warning" id="clearAllBtn">Clear All Tasks</button>
      </div>

      <div class="grid">
        <input type="text" id="search" placeholder="Search tasks..." />
        <select id="filter">
          <option value="all">All Tasks</option>
          <option value="pending">Pending</option>
          <option value="done">Done</option>
          <option value="today">Due Today</option>
        </select>
      </div>

      <div class="task-list" id="taskList"></div>
      <div class="empty" id="emptyState" style="display:none;">No tasks found.</div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const dateEl = document.getElementById('date');
    const timeEl = document.getElementById('time');
    const priorityEl = document.getElementById('priority');
    const descriptionEl = document.getElementById('description');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const taskList = document.getElementById('taskList');
    const searchEl = document.getElementById('search');
    const filterEl = document.getElementById('filter');
    const totalCountEl = document.getElementById('totalCount');
    const doneCountEl = document.getElementById('doneCount');
    const pendingCountEl = document.getElementById('pendingCount');
    const emptyState = document.getElementById('emptyState');
    const editModeBox = document.getElementById('editModeBox');

    let tasks = JSON.parse(localStorage.getItem('studentTasks')) || [];
    let editIndex = null;

    function saveTasks() {
      localStorage.setItem('studentTasks', JSON.stringify(tasks));
    }

    function resetForm() {
      titleEl.value = '';
      dateEl.value = '';
      timeEl.value = '';
      priorityEl.value = 'Medium';
      descriptionEl.value = '';
      editIndex = null;
      saveBtn.textContent = 'Add Task';
      editModeBox.style.display = 'none';
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'No date';
      const d = new Date(dateStr);
      return d.toLocaleDateString();
    }

    function getFilteredTasks() {
      const search = searchEl.value.toLowerCase().trim();
      const filter = filterEl.value;
      const today = new Date().toISOString().split('T')[0];

      return tasks.filter(task => {
        const matchesSearch =
          task.title.toLowerCase().includes(search) ||
          task.description.toLowerCase().includes(search);

        const matchesFilter =
          filter === 'all' ||
          (filter === 'pending' && !task.done) ||
          (filter === 'done' && task.done) ||
          (filter === 'today' && task.date === today);

        return matchesSearch && matchesFilter;
      });
    }

    function updateStats() {
      totalCountEl.textContent = tasks.length;
      doneCountEl.textContent = tasks.filter(t => t.done).length;
      pendingCountEl.textContent = tasks.filter(t => !t.done).length;
    }

    function renderTasks() {
      const filtered = getFilteredTasks();
      taskList.innerHTML = '';

      emptyState.style.display = filtered.length ? 'none' : 'block';

      filtered.forEach((task, index) => {
        const actualIndex = tasks.findIndex(t =>
          t.id === task.id
        );

        const card = document.createElement('div');
        card.className = 'task' + (task.done ? ' done' : '');

        const priorityClass =
          task.priority === 'High'
            ? 'priority-high'
            : task.priority === 'Low'
            ? 'priority-low'
            : 'priority-medium';

        card.innerHTML = `
          <div class="task-top">
            <div>
              <h3 class="title">${task.title}</h3>
              <div class="small">${task.description || 'No description'}</div>
            </div>
            <div class="badge ${priorityClass}">${task.priority}</div>
          </div>

          <div class="meta">
            <span class="badge">Date: ${formatDate(task.date)}</span>
            <span class="badge">Time: ${task.time || 'No time'}</span>
            <span class="badge">${task.done ? 'Completed' : 'Pending'}</span>
          </div>

          <div class="task-actions">
            <button class="success" onclick="toggleDone(${actualIndex})">
              ${task.done ? 'Undo' : 'Mark Done'}
            </button>
            <button class="secondary" onclick="editTask(${actualIndex})">Edit</button>
            <button class="danger" onclick="deleteTask(${actualIndex})">Delete</button>
          </div>
        `;

        taskList.appendChild(card);
      });

      updateStats();
    }

    function addOrUpdateTask() {
      const title = titleEl.value.trim();
      const date = dateEl.value;
      const time = timeEl.value;
      const priority = priorityEl.value;
      const description = descriptionEl.value.trim();

      if (!title) {
        alert('Please enter a task title.');
        return;
      }

      const taskObj = {
        id: editIndex !== null ? tasks[editIndex].id : Date.now(),
        title,
        date,
        time,
        priority,
        description,
        done: editIndex !== null ? tasks[editIndex].done : false
      };

      if (editIndex === null) {
        tasks.unshift(taskObj);
      } else {
        tasks[editIndex] = taskObj;
      }

      saveTasks();
      resetForm();
      renderTasks();
    }

    function editTask(index) {
      const task = tasks[index];
      titleEl.value = task.title;
      dateEl.value = task.date;
      timeEl.value = task.time;
      priorityEl.value = task.priority;
      descriptionEl.value = task.description;
      editIndex = index;
      saveBtn.textContent = 'Save Task';
      editModeBox.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteTask(index) {
      if (!confirm('Delete this task?')) return;
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    function toggleDone(index) {
      tasks[index].done = !tasks[index].done;
      saveTasks();
      renderTasks();
    }

    clearBtn.addEventListener('click', resetForm);

    clearAllBtn.addEventListener('click', () => {
      if (!confirm('Clear all tasks?')) return;
      tasks = [];
      saveTasks();
      resetForm();
      renderTasks();
    });

    saveBtn.addEventListener('click', addOrUpdateTask);
    searchEl.addEventListener('input', renderTasks);
    filterEl.addEventListener('change', renderTasks);

    renderTasks();
  </script>
</body>
</html>
